name: CI/CD Portfolio Deployment

on:
  push:
    branches: [ "main" ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Iniciar sesión en Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. Compilar y subir la nueva imagen del Backend
    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:latest

    # 4. Compilar y subir la nueva imagen del Frontend
    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:latest

    # 5. Copiar los manifiestos de Kubernetes al servidor
    - name: Copy K8s manifests to VPS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "k8s/"
        target: "~/"

    # 6. Conectarse al VPS, aplicar la infraestructura y reiniciar
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.VPS_HOST }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Entrar en la carpeta recién copiada
          cd ~/k8s
          
          # Aplicar cualquier cambio en los YAML (límites de CPU, nuevas rutas, etc.)
          kubectl apply -f .
          
          # Forzar el reinicio para asegurar que toman la nueva imagen de Docker
          kubectl rollout restart deployment/backend-deployment
          kubectl rollout restart deployment/frontend-deployment
name: CI/CD Portfolio Deployment

on:
  push:
    branches: [ "main" ]  # Se activará cada vez que subas cambios a la rama main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio en el servidor de GitHub
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Iniciar sesión en Docker Hub de forma segura
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. Compilar y subir la nueva imagen del Backend
    - name: Build and push Backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:latest

    # 4. Compilar y subir la nueva imagen del Frontend
    - name: Build and push Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:latest

    # 5. Conectarse al VPS por SSH y decirle a Kubernetes que reinicie los contenedores
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.VPS_HOST }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd portfolio-k8s
          kubectl rollout restart deployment/backend-deployment
          kubectl rollout restart deployment/frontend-deployment
name: CI/CD Portfolio Deployment

on:
  push:
    branches: [ "main" ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Etiquetamos con el SHA del commit y también como latest
    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:${{ github.sha }}
          ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:latest

    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:${{ github.sha }}
          ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:latest

    - name: Copy K8s manifests to VPS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "k8s/"
        target: "~/"

    # Inyectamos el SHA en el servidor y le decimos a K8s qué versión exacta usar
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v0.1.10
      env:
        GITHUB_SHA: ${{ github.sha }}
        DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      with:
        host: ${{ secrets.VPS_HOST }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: GITHUB_SHA,DOCKER_USER
        script: |
          echo "Entrando a la carpeta de manifiestos..."
          cd ~/k8s
          
          echo "Aplicando configuración estructural en Kubernetes..."
          kubectl apply -R -f .
          
          echo "Desplegando la nueva versión: $GITHUB_SHA"
          # Esto actualiza la imagen y lanza el Rolling Update automáticamente sin caídas
          kubectl set image deployment/backend-deployment backend=$DOCKER_USER/portfolio-backend:$GITHUB_SHA
          kubectl set image deployment/frontend-deployment frontend=$DOCKER_USER/portfolio-frontend:$GITHUB_SHA
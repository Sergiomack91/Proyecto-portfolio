name: CI/CD Portfolio Deployment

on:
  push:
    branches: [ "main" ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código (Actualizado a v4)
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Iniciar sesión en Docker Hub (Actualizado a v3)
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. Compilar y subir la nueva imagen del Backend (Actualizado a v5)
    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:latest

    # 4. Compilar y subir la nueva imagen del Frontend (Actualizado a v5)
    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:latest

    # 5. Conectarse al VPS por SSH y reiniciar (Mantenemos la que funciona bien)
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.VPS_HOST }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd portfolio-k8s
          kubectl rollout restart deployment/backend-deployment
          kubectl rollout restart deployment/frontend-deployment